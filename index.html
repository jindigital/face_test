<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 얼굴 필터 앱</title>
    <style>
        body { 
            background-color: #f5f5dc; 
            background-image: radial-gradient(#ffc0cb 1px, transparent 1px); 
            background-size: 20px 20px; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
        }
        #camera-container { width: 100%; max-width: 400px; height: 300px; border: 2px solid #ff69b4; margin-bottom: 20px; background: #fff; }
        .controls { margin-top: 10px; }
    </style>
</head>
<body>
    <h1>AI 얼굴 필터 생성기</h1>
    <video id="camera-container" autoplay playsinline></video>
    <div class="controls">
        <input type="text" id="prompt" placeholder="필터로 만들 이미지 (예: 안경)">
        <button onclick="generateFilter()">생성하기</button>
    </div>

    <script>
        const video = document.getElementById('camera-container');
        navigator.mediaDevices.getUserMedia({ video: true }).then(s => video.srcObject = s);

async function generateFilter() {
    const prompt = document.getElementById('prompt').value;
    const button = document.querySelector('button');

    if (!prompt) {
        alert("필터로 만들 이미지를 입력해 주세요!");
        return;
    }

    try {
        // 로딩 상태 표시
        button.disabled = true;
        button.innerText = "생성 중...";

        // 서버(api/generate.js)로 데이터 전송
        const response = await fetch('/api/generate', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ prompt: prompt })
        });

        const data = await response.json();

        // 결과 확인
        if (response.ok) {
            alert("서버 연결 성공! 응답: " + data.message);
            // 향후 이 부분에 Gemini가 생성한 이미지를 화면에 합성하는 로직이 들어갑니다.
        } else {
            alert("오류가 발생했습니다: " + data.error);
        }
    } catch (error) {
        alert("통신 중 오류가 발생했습니다: " + error.message);
    } finally {
        // 버튼 상태 원상복구
        button.disabled = false;
        button.innerText = "생성하기";
    }
}
        }
    </script>
</body>
</html>
